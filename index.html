<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>展示会2026 商品カタログ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#B8860B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #FBF8F1;
  --bg-card: #FFFFFF;
  --ink: #2B2115;
  --ink-soft: #6B5D4C;
  --gold: #B8860B;
  --gold-deep: #8C6511;
  --gold-light: #E9C878;
  --amber: #A6560B;
  --amber-light: #F4E3C7;
  --line: #E9E0CD;
  --shadow: 0 4px 18px rgba(60,45,15,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: var(--bg);
  color: var(--ink);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 74px;
}
h1,h2,h3, .display{
  font-family: 'Fraunces', serif;
  font-optical-sizing: auto;
}

/* ===== Header ===== */
header.top{
  position: sticky; top:0; z-index: 50;
  background: linear-gradient(180deg, #ffffff 0%, #FCF9F0 100%);
  border-bottom: 1px solid var(--line);
  padding: 14px 16px 12px;
}
.brand-row{ display:flex; align-items:center; gap:10px; }
.brand-seal{
  width:38px;height:38px;border-radius:50%;
  background: radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold) 60%, var(--gold-deep));
  display:flex;align-items:center;justify-content:center;
  color:#fff; font-weight:700; font-size:15px; font-family:'Fraunces',serif;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,0.25), 0 2px 4px rgba(140,101,17,0.4);
  flex-shrink:0;
}
.brand-text h1{ font-size:19px; margin:0; line-height:1.15; font-weight:600; color:var(--ink);}
.brand-text span{ font-size:11px; color:var(--ink-soft); letter-spacing:.06em; }

.caution-entry-btn{
  display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
  margin-top:12px; padding:11px 12px; border:none; border-radius:11px; cursor:pointer;
  background: linear-gradient(180deg, #D1150A 0%, #A8100A 100%); color:#fff;
  font-family:inherit; font-size:13px; font-weight:700; letter-spacing:.02em;
  box-shadow: 0 3px 8px rgba(161,17,10,0.35);
}
.caution-entry-mark{
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  width:18px; height:18px; border-radius:50%; background:#fff; color:#D1150A;
  font-size:12px; font-weight:900;
}

.search-wrap{ margin-top:12px; position:relative; }
.search-wrap input{
  width:100%; padding: 11px 14px 11px 40px;
  border-radius: 12px; border:1.5px solid var(--line);
  background:#fff; font-size:15px; font-family:inherit; color:var(--ink);
  outline:none; transition: border-color .15s;
}
.search-wrap input:focus{ border-color: var(--gold); }
.search-wrap svg{ position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.5; }
.search-clear{
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  border:none; background:none; color:var(--ink-soft); font-size:18px; padding:4px 8px; cursor:pointer; display:none;
}

.tabs{ display:flex; gap:6px; margin-top:12px; }
.tab-btn{
  flex:1; padding:9px 2px; border-radius:10px; border:1.5px solid var(--line);
  background:#fff; color:var(--ink-soft); font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:12px; font-weight:700; cursor:pointer; transition: all .15s;
  display:flex; align-items:center; justify-content:center; gap:4px; white-space:nowrap;
}
.tab-btn.active{ background: var(--ink); color:#fff; border-color: var(--ink); }

/* category chip row */
.chip-row{
  display:flex; gap:7px; overflow-x:auto; padding: 12px 16px 2px;
  scrollbar-width:none;
}
.chip-row::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0; padding:7px 14px; border-radius:999px; border:1.3px solid var(--line);
  background:#fff; color:var(--ink-soft); font-size:12.5px; font-weight:700; cursor:pointer;
  white-space:nowrap; transition: all .15s;
}
.chip.active{ background: var(--amber); border-color:var(--amber); color:#fff; }

main{ padding: 6px 16px 30px; max-width: 720px; margin:0 auto; }

.section-label{
  font-size:12px; color:var(--ink-soft); font-weight:700; letter-spacing:.08em;
  margin: 18px 2px 10px; display:flex; justify-content:space-between; align-items:baseline;
}

/* ===== Company grid ===== */
.company-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
.company-card{
  background:var(--bg-card); border:1px solid var(--line); border-radius:14px;
  padding:14px 12px; cursor:pointer; box-shadow: var(--shadow);
  transition: transform .12s;
  position:relative;
}
.company-card:active{ transform: scale(0.97); }
.company-card .cname{
  font-weight:700; font-size:14px; line-height:1.35; color:var(--ink);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.company-card .ccount{
  margin-top:8px; font-size:11.5px; color:var(--gold-deep); font-weight:700;
}
.booth-badge{
  position:absolute; top:10px; right:10px;
  background: var(--ink); color:#fff; font-size:10.5px; font-weight:800;
  padding:3px 8px; border-radius:999px; font-family:'Fraunces',serif; letter-spacing:.02em;
}

/* ===== Product grid ===== */
.product-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
.product-card{
  background:var(--bg-card); border:1px solid var(--line); border-radius:14px;
  overflow:hidden; cursor:pointer; box-shadow: var(--shadow); position:relative;
  display:flex; flex-direction:column;
}
.product-card .thumb{
  width:100%; aspect-ratio: 1/1; background:#F4EFE2;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.product-card .thumb img{ width:100%; height:100%; object-fit:contain; padding:8px;}
.product-card .noimg{ color:#C9BB9B; font-size:11px; font-weight:700; letter-spacing:.05em;}
.product-card .pinfo{ padding:10px 11px 12px; }
.product-card .pname{
  font-size:13px; font-weight:700; line-height:1.35; color:var(--ink);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  min-height: 34px;
}
.product-card .pcompany{ font-size:11px; color:var(--ink-soft); margin-top:4px;
  display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;}
.product-card .pprice{ font-size:12.5px; color:var(--amber); font-weight:800; margin-top:6px;}
.fav-btn{
  position:absolute; top:8px; right:8px; width:30px;height:30px; border-radius:50%;
  background:rgba(255,255,255,0.9); border:1px solid var(--line); display:flex; align-items:center;justify-content:center;
  cursor:pointer; z-index:2;
}
.fav-btn svg{ width:16px;height:16px; }
.code-badge{
  position:absolute; top:8px; left:8px; width:24px;height:24px; border-radius:50%;
  background: linear-gradient(160deg, var(--gold-light), var(--gold-deep));
  color:#fff; font-size:11px; font-weight:800; display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif; z-index:2; box-shadow: 0 1px 3px rgba(0,0,0,.3);
}

.empty-state{ text-align:center; padding: 50px 20px; color:var(--ink-soft); }
.empty-state svg{ opacity:.4; margin-bottom:10px; }

.booth-group-header{
  display:flex; align-items:center; gap:8px; margin:18px 2px 10px; padding-bottom:6px;
  border-bottom:1.5px solid var(--line);
}
.booth-group-header:first-child{ margin-top:2px; }
.booth-group-no{
  background: var(--ink); color:#fff; font-size:11px; font-weight:800; padding:3px 9px;
  border-radius:999px; font-family:'Fraunces',serif; flex-shrink:0;
}
.booth-group-name{ font-size:13.5px; font-weight:700; color:var(--ink); }

.fav-intro{
  font-size:12.5px; color:var(--ink-soft); background:var(--amber-light); border-radius:10px;
  padding:10px 14px; margin:8px 2px 4px; line-height:1.6;
}
.bulk-quote-btn{
  display:block; width:100%; margin:2px 0 4px; padding:11px; border:none; border-radius:10px;
  background: var(--amber); color:#fff; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;
}

.notice-caution{
  background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 16px 8px;
  margin:8px 2px 18px;
}
.notice-caution-title{
  text-align:center; font-size:15px; font-weight:800; letter-spacing:2px; color:var(--ink);
  margin-bottom:12px;
}
.notice-caution-list{ list-style:none; margin:0; padding:0; }
.notice-caution-list li{
  display:flex; align-items:flex-start; gap:8px; font-size:12.5px; line-height:1.6;
  color:var(--ink-soft); padding-bottom:12px; margin-bottom:12px; border-bottom:1px dashed var(--line);
}
.notice-caution-list li:last-child{ border-bottom:none; margin-bottom:0; }
.notice-caution-list li.is-alert{ color:#D1150A; font-weight:700; }
.notice-caution-mark{ flex-shrink:0; font-weight:800; }
.notice-caution-list li.is-alert .notice-caution-mark{ color:#D1150A; }
.notice-caution-list li:not(.is-alert) .notice-caution-mark{ color:var(--amber); }

.notice-shoplist{
  background:var(--amber-light); border-radius:14px; padding:16px; margin:8px 2px 18px;
}
.notice-shoplist-text{
  font-size:12.5px; color:var(--ink-soft); line-height:1.6; margin-bottom:12px;
}
.notice-shoplist-btn{
  display:block; text-align:center; text-decoration:none; width:100%; box-sizing:border-box;
}
.notice-doc-list{ display:flex; flex-direction:column; gap:10px; margin:0 2px; }
.notice-doc-card{
  display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit;
  background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px;
}
.notice-doc-icon{ font-size:22px; flex-shrink:0; }
.notice-doc-title{ font-size:14px; font-weight:700; color:var(--ink); }
.notice-doc-sub{ font-size:12px; color:var(--amber); margin-top:2px; }

/* ===== Bottom nav ===== */
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
  display:flex; z-index:60; padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
}
.nav-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  background:none; border:none; color:var(--ink-soft); font-size:10.5px; font-weight:700;
  padding:6px 0; cursor:pointer; font-family:inherit;
}
.nav-btn.active{ color: var(--amber); }
.nav-btn svg{ width:21px; height:21px; }

/* ===== Modal ===== */
.modal-overlay{
  position:fixed; inset:0; background: rgba(30,20,10,0.55); z-index:100;
  display:none; align-items:flex-end; justify-content:center;
}
.modal-overlay.show{ display:flex; }
.modal-sheet{
  background:#fff; width:100%; max-width:720px; max-height:88vh; overflow-y:auto;
  border-radius: 22px 22px 0 0; animation: slideup .22s ease-out;
  padding-bottom: 24px;
}
@keyframes slideup{ from{ transform:translateY(30px); opacity:0;} to{transform:translateY(0);opacity:1;} }
.modal-handle{ width:38px; height:4px; background:var(--line); border-radius:99px; margin:10px auto 4px;}
.modal-close{
  position:absolute; top:14px; right:16px; width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.06); border:none; font-size:18px; color:var(--ink); cursor:pointer;
}
.modal-img{ width:100%; aspect-ratio: 4/5; background:#F4EFE2; display:flex;align-items:center;justify-content:center; }
.modal-img img{ max-width:85%; max-height:95%; object-fit:contain; }
.modal-body{ padding: 16px 20px 4px; }
.caution-modal-body{ padding:0; }
.caution-notice-img{ display:block; width:100%; height:auto; border-radius: 22px 22px 0 0; }
.caution-modal-body ~ .modal-close, .modal-close.on-image{
  background:rgba(255,255,255,0.9); box-shadow:0 2px 6px rgba(0,0,0,0.25);
}
.doc-modal-body{ padding:0; max-height:82vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.doc-modal-title{ font-size:15px; font-weight:700; padding:16px 50px 8px 20px; }
.doc-modal-page{ display:block; width:100%; height:auto; border-bottom:1px solid var(--line); }
.doc-modal-page:last-child{ border-bottom:none; }
.modal-company-tag{
  display:inline-block; font-size:12px; font-weight:700; color:var(--gold-deep);
  background: var(--amber-light); padding:4px 10px; border-radius:999px; margin-bottom:8px;
}
.modal-title{ font-size:21px; font-weight:600; line-height:1.35; margin:0 0 4px; }
.modal-producer{ font-size:13px; color:var(--ink-soft); margin-bottom:14px; }
.modal-price{ font-size:22px; font-weight:800; color: var(--amber); margin-bottom: 16px; }
.code-callout{
  display:flex; align-items:center; gap:8px; background: var(--amber-light); border-radius:10px;
  padding:10px 14px; font-size:13px; color: var(--gold-deep); font-weight:700; margin-bottom:16px; line-height:1.5;
}
.code-callout-letter{
  display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%;
  background: var(--amber); color:#fff; font-family:'Fraunces',serif; font-size:15px; flex-shrink:0;
}
.spec-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px 14px; margin-bottom:18px; }
.spec-item{ border-top:1px solid var(--line); padding-top:8px; }
.spec-item .k{ font-size:10.5px; color:var(--ink-soft); font-weight:700; letter-spacing:.04em;}
.spec-item .v{ font-size:14px; font-weight:700; margin-top:2px; }
.modal-actions{ display:flex; gap:10px; padding: 4px 20px 0; }
.quote-hint{ font-size:11.5px; color:var(--ink-soft); text-align:center; padding:8px 20px 0; line-height:1.5; }
.btn{
  flex:1; padding:13px; border-radius:12px; border:none; font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit; text-align:center; text-decoration:none; display:block;
}
.btn-primary{ background: var(--amber); color:#fff; }
.btn-secondary{ background: var(--amber-light); color: var(--gold-deep); }

/* company detail view */
.company-header{
  background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px;
  box-shadow: var(--shadow);
}
.company-header h2{ margin:0 0 4px; font-size:19px; font-weight:600; }
.company-header .sub{ font-size:12.5px; color:var(--ink-soft); }
.back-link{
  display:inline-flex; align-items:center; gap:4px; color:var(--ink-soft); font-size:13px;
  font-weight:700; background:none; border:none; cursor:pointer; padding:0; margin-bottom:10px; font-family:inherit;
}

.loading{ text-align:center; padding:60px 20px; color:var(--ink-soft); }

.map-frame{
  width:100%; height:calc(100vh - 220px); min-height:500px; border:none; border-radius:14px;
  background:#F5F4F1;
}
</style>
</head>
<body>

<header class="top">
  <div class="brand-row">
    <div class="brand-seal">'26</div>
    <div class="brand-text">
      <h1>試飲会 商品カタログ</h1>
      <span>展示会2026・出展社一覧</span>
    </div>
  </div>
  <button class="caution-entry-btn" id="cautionEntryBtn">
    <span class="caution-entry-mark">!</span>
    初めに注意事項をご確認ください
  </button>
  <div class="search-wrap">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#6B5D4C" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="#6B5D4C" stroke-width="2" stroke-linecap="round"/></svg>
    <input id="searchInput" type="text" placeholder="商品名・メーカー・出展社で検索" autocomplete="off">
    <button class="search-clear" id="clearBtn">×</button>

</header>

<div class="chip-row" id="chipRow" style="display:none;"></div>

<main id="main">
  <div class="loading">読み込み中…</div>
</main>

<div class="bottom-nav">

    出展社
  </button>
  <button class="nav-btn" data-view="products">
    <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/></svg>
    商品一覧
  </button>
  <button class="nav-btn" data-view="map">
    <svg viewBox="0 0 24 24" fill="none"><path d="M9 20l-6 3V6l6-3m0 17l6-3m-6 3V3m6 14l6 3V4l-6-3m0 17V4" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    会場マップ
  </button>
  <button class="nav-btn" data-view="favorites">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 4l2.47 5.01 5.53.8-4 3.9.94 5.5L12 16.6l-4.94 2.6.94-5.5-4-3.9 5.53-.8L12 4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    お気に入り
  </button>
  <button class="nav-btn" data-view="notice">
    <svg viewBox="0 0 24 24" fill="none"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    お知らせ
  </button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet"></div>
</div>

<script>
const FAV_KEY = 'whisky2026_favorites';
const BULK_QUOTE_URL = 'https://forms.office.com/r/1cZdWCAUPa?origin=lprLink';
let PRODUCTS = [];
let COMPANIES = [];
let currentView = 'companies';
let currentCompany = null;
let activeCategory = 'all';
let searchTerm = '';

function getFavs(){ try{ return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }catch(e){ return []; } }
function setFavs(arr){ localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }
function isFav(id){ return getFavs().includes(id); }
function toggleFav(id){
  let f = getFavs();
  if(f.includes(id)) f = f.filter(x=>x!==id); else f.push(id);
  setFavs(f);
}

function loadData(){
  PRODUCTS = window.__PRODUCTS__ || [];
  COMPANIES = window.__COMPANIES__ || [];
  render();
}

function escapeHtml(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function matchesSearch(p, term){
  if(!term) return true;
  const t = term.toLowerCase();
  return [p.name, p.company, p.producer, p.category, p.origin].some(f => f && String(f).toLowerCase().includes(t));
}

const CATS = ['all','ウイスキー','ジン','ラム','ウォッカ','テキーラ/メスカル','ブランデー','リキュール','焼酎','日本酒','ビール','スピリッツ','ノンアルコール','飲料','その他/フード','その他'];
const CAT_LABELS = {all:'すべて'};

function renderChips(){
  const row = document.getElementById('chipRow');
  if(currentView !== 'products'){ row.style.display='none'; return; }
  row.style.display='flex';
  row.innerHTML = CATS.map(c => `<button class="chip ${activeCategory===c?'active':''}" data-cat="${escapeHtml(c)}">${escapeHtml(CAT_LABELS[c]||c)}</button>`).join('');
  row.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{ activeCategory = btn.dataset.cat; render(); });
  });
}

function productCardHtml(p){
  const img = p.image ? `<img src="images/${p.image}" alt="${escapeHtml(p.name)}" loading="lazy">` : `<span class="noimg">NO IMAGE</span>`;
  const fav = isFav(p.id);
  return `
  <div class="product-card" data-id="${p.id}">
    <div class="code-badge">${escapeHtml(p.code||'')}</div>
    <button class="fav-btn" data-fav="${p.id}">
      <svg viewBox="0 0 24 24" fill="${fav?'#B8860B':'none'}"><path d="M12 4l2.47 5.01 5.53.8-4 3.9.94 5.5L12 16.6l-4.94 2.6.94-5.5-4-3.9 5.53-.8L12 4z" stroke="${fav?'#B8860B':'#6B5D4C'}" stroke-width="2" stroke-linejoin="round"/></svg>
    </button>
    <div class="thumb">${img}</div>
    <div class="pinfo">
      <div class="pname">${escapeHtml(p.name)}</div>
      <div class="pcompany">${escapeHtml(p.company)}${p.booth ? ` ・ No.${p.booth}` : ''}</div>
      <div class="pprice">${escapeHtml(p.price_display||'')}</div>
    </div>
  </div>`;
}

function companyCardHtml(c){
  return `
  <div class="company-card" data-company="${escapeHtml(c.name)}">
    ${c.booth ? `<div class="booth-badge">No.${c.booth}</div>` : ''}
    <div class="cname">${escapeHtml(c.name)}</div>
    <div class="ccount">出品 ${c.count}点</div>
  </div>`;
}

function groupedProductGridHtml(list, opts){
  opts = opts || {};
  // group consecutive-by-booth so results are clearly separated per exhibitor
  const sorted = [...list].sort((a,b)=>{
    const ba = a.booth||9999, bb = b.booth||9999;
    if(ba !== bb) return ba - bb;
    return (a.company||'').localeCompare(b.company||'');
  });
  let html = '';
  let lastKey = null;
  let buffer = [];
  let groupItems = [];
  function flush(){
    if(buffer.length) html += `<div class="product-grid">${buffer.join('')}</div>`;
    if(opts.bulkQuote && groupItems.length){
      const booth = groupItems[0].booth;
      const boothCode = booth ? `B${booth}` : '';
      const codes = groupItems.map(x=>x.code).filter(Boolean).join('、');
      const copyText = `${groupItems[0].company} ・ ブース${boothCode} ・ 商品記号：${codes}`;
      html += `<button class="bulk-quote-btn bulk-quote-manual" data-href="${escapeHtml(BULK_QUOTE_URL)}" data-copytext="${escapeHtml(copyText)}">📋 このブース（${escapeHtml(boothCode)}）の${groupItems.length}点をまとめて見積依頼</button>`;
    }
    buffer = [];
    groupItems = [];
  }
  sorted.forEach(p=>{
    const key = p.company;
    if(key !== lastKey){
      flush();
      html += `<div class="booth-group-header">${p.booth ? `<span class="booth-group-no">No.${p.booth}</span>` : ''}<span class="booth-group-name">${escapeHtml(p.company)}</span></div>`;
      lastKey = key;
    }
    buffer.push(productCardHtml(p));
    groupItems.push(p);
  });
  flush();
  return html;
}

function render(){
  renderChips();
  const main = document.getElementById('main');

  if(currentView === 'companies' && !currentCompany){
    let list = COMPANIES;
    if(searchTerm) list = list.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
    main.innerHTML = `
      <div class="section-label"><span>出展社一覧</span><span>${list.length}社</span></div>
      <div class="company-grid">${list.map(companyCardHtml).join('') || emptyHtml('出展社が見つかりません')}</div>
    `;
    main.querySelectorAll('.company-card').forEach(el=>{
      el.addEventListener('click', ()=>{ currentCompany = el.dataset.company; searchTerm=''; document.getElementById('searchInput').value=''; render(); });
    });
    return;
  }

  if(currentView === 'companies' && currentCompany){
    const items = PRODUCTS.filter(p => p.company === currentCompany);
    const boothNo = items[0] && items[0].booth;
    main.innerHTML = `
      <button class="back-link" id="backBtn">← 出展社一覧に戻る</button>
      <div class="company-header">
        ${boothNo ? `<div class="booth-badge" style="position:static;display:inline-block;margin-bottom:8px;">No.${boothNo}</div>` : ''}
        <h2>${escapeHtml(currentCompany)}</h2>
        <div class="sub">出品商品 ${items.length}点</div>
      </div>
      <div class="product-grid">${items.map(productCardHtml).join('')}</div>
    `;
    bindProductEvents();
    document.getElementById('backBtn').addEventListener('click', ()=>{ currentCompany=null; render(); });
    return;
  }

  if(currentView === 'products'){
    let list = PRODUCTS.filter(p => matchesSearch(p, searchTerm));
    if(activeCategory !== 'all') list = list.filter(p => p.cat_group === activeCategory);
    main.innerHTML = `
      <div class="section-label"><span>商品一覧</span><span>${list.length}点</span></div>
      ${list.length ? groupedProductGridHtml(list) : emptyHtml('該当する商品がありません')}
    `;
    bindProductEvents();
    return;
  }

  if(currentView === 'map'){
    main.innerHTML = `<iframe src="map.html" class="map-frame" title="会場マップ"></iframe>`;
    return;
  }

  if(currentView === 'favorites'){
    const favIds = getFavs();
    const list = PRODUCTS.filter(p => favIds.includes(p.id));
    main.innerHTML = `
      <div class="section-label"><span>お気に入り</span><span>${list.length}点</span></div>
      ${list.length ? `<div class="fav-intro">ブースごとに「まとめて見積依頼」ボタンで、そのブースの商品記号をまとめてコピーできます。</div>` : ''}
      ${list.length ? groupedProductGridHtml(list, {bulkQuote:true}) : emptyHtml('まだお気に入りがありません')}
    `;
    bindProductEvents();
    bindBulkQuoteEvents();
    return;
  }

  if(currentView === 'notice'){
    main.innerHTML = `
      <div class="section-label"><span>お知らせ</span></div>
      <div class="notice-shoplist">
        <div class="notice-shoplist-text">ALLIQの拠点・店舗一覧はこちらから（QRコードが読み取りにくい場合はこちらのボタンをご利用ください）</div>
        <a class="btn btn-primary notice-shoplist-btn" href="https://alliq.co.jp/shoplist/">ALLIQ拠点・店舗一覧を見る</a>
      </div>
      <div class="notice-doc-list">
        <a class="notice-doc-card" href="docs/company_profile_2026.pdf" onclick="openDocModal(['assets/docs/company_profile_2026_p1.jpg','assets/docs/company_profile_2026_p2.jpg'],'会社案内チラシ2026'); return false;">
          <div class="notice-doc-icon">📄</div>
          <div class="notice-doc-info">
            <div class="notice-doc-title">会社案内チラシ2026</div>
            <div class="notice-doc-sub">PDFを見る</div>
          </div>
        </a>
        <a class="notice-doc-card" href="docs/alliq.pdf" onclick="openDocModal(['assets/docs/alliq_p1.jpg'],'ALLIQ拠点案内'); return false;">
          <div class="notice-doc-icon">📄</div>
          <div class="notice-doc-info">
            <div class="notice-doc-title">ALLIQ拠点案内</div>
            <div class="notice-doc-sub">PDFを見る</div>
          </div>
        </a>
      </div>
    `;
    return;
  }
}

function emptyHtml(msg){
  return `<div class="empty-state" style="grid-column:1/-1;">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#6B5D4C" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="#6B5D4C" stroke-width="2" stroke-linecap="round"/></svg>
    <div>${escapeHtml(msg)}</div>
  </div>`;
}

function bindProductEvents(){
  document.querySelectorAll('.product-card').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('.fav-btn')) return;
      openProductModal(parseInt(el.dataset.id));
    });
  });
  document.querySelectorAll('[data-fav]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      toggleFav(parseInt(el.dataset.fav));
      render();
    });
  });
}

function bindBulkQuoteEvents(){
  document.querySelectorAll('.bulk-quote-manual').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      copyToClipboard(btn.dataset.copytext);
      const original = btn.textContent;
      btn.textContent = 'コピーしました ✓ フォームを開いています…';
      setTimeout(()=>{ btn.textContent = original; }, 2500);
      window.open(btn.dataset.href, '_blank', 'noopener');
    });
  });
}

function openProductModal(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p) return;
  const sheet = document.getElementById('modalSheet');
  const fav = isFav(p.id);
  const img = p.image ? `<img src="images/${p.image}" alt="${escapeHtml(p.name)}">` : `<span class="noimg">NO IMAGE</span>`;
  const mailBody = encodeURIComponent(`商品名：${p.name}\n出展社：${p.company}\nJAN：${p.jan||''}\n\n上記商品について見積を依頼します。`);
  const boothCode = p.booth ? `B${p.booth}` : '';
  const quoteHref = p.quote_url || `mailto:si-tanaka@alliq.co.jp?subject=${encodeURIComponent('【見積依頼】'+p.name)}&body=${mailBody}`;
  const copyText = `${p.company} ・ ブース${boothCode} ・ 商品記号${p.code||''}（${p.name}）`;
  sheet.innerHTML = `
    <div class="modal-handle"></div>
    <button class="modal-close" id="modalClose">×</button>
    <div class="modal-img">${img}</div>
    <div class="modal-body">
      <div class="modal-company-tag">${escapeHtml(p.company)}${p.booth ? ` ・ No.${p.booth}` : ''}</div>
      <h3 class="modal-title">${escapeHtml(p.name)}</h3>
      <div class="modal-producer">${escapeHtml(p.producer||'')}</div>
      <div class="modal-price">${escapeHtml(p.price_display||'価格未定')}</div>
      ${p.code ? `<div class="code-callout">見積フォームでは商品記号 <span class="code-callout-letter">${escapeHtml(p.code)}</span> を選択してください</div>` : ''}
      <div class="spec-grid">
        <div class="spec-item"><div class="k">産地</div><div class="v">${escapeHtml(p.origin||'-')}</div></div>
        <div class="spec-item"><div class="k">容量</div><div class="v">${escapeHtml(p.volume||'-')}${p.volume && !String(p.volume).includes('ml') ? 'ml':''}</div></div>
        <div class="spec-item"><div class="k">カテゴリー</div><div class="v">${escapeHtml(p.category||'-')}</div></div>
        <div class="spec-item"><div class="k">JAN</div><div class="v" style="font-size:12px;">${escapeHtml(p.jan||'-')}</div></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalFav">${fav?'★ お気に入り済み':'☆ お気に入りに追加'}</button>
      <button class="btn btn-primary" id="modalQuoteBtn" data-href="${escapeHtml(quoteHref)}" data-copytext="${escapeHtml(copyText)}">見積依頼フォームを開く</button>
    </div>
    <div class="quote-hint">出展社名・ブース番号・商品記号をコピーしました。フォームの「見積を希望する商品」で<strong>${escapeHtml(p.code||'')}</strong>にチェックしてください。</div>
  `;
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalFav').addEventListener('click', ()=>{ toggleFav(p.id); openProductModal(p.id); render(); });
  const quoteBtn = document.getElementById('modalQuoteBtn');
  if(quoteBtn){
    quoteBtn.addEventListener('click', ()=>{
      copyToClipboard(quoteBtn.dataset.copytext);
      const original = quoteBtn.textContent;
      quoteBtn.textContent = 'コピーしました ✓ フォームで確認';
      setTimeout(()=>{ quoteBtn.textContent = original; }, 2000);
      window.open(quoteBtn.dataset.href, '_blank', 'noopener');
    });
  }
  document.getElementById('modalOverlay').classList.add('show');
}
function copyToClipboard(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }

function openCautionModal(){
  const sheet = document.getElementById('modalSheet');
  sheet.innerHTML = `
    <div class="modal-handle"></div>
    <button class="modal-close on-image" id="modalClose">×</button>
    <div class="caution-modal-body">
      <img src="assets/caution_notice.jpg" alt="お願い・注意事項" class="caution-notice-img">
    </div>
  `;
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').classList.add('show');
}
document.getElementById('cautionEntryBtn').addEventListener('click', openCautionModal);

function openDocModal(pages, title){
  const sheet = document.getElementById('modalSheet');
  const imgs = pages.map(src => `<img src="${escapeHtml(src)}" alt="${escapeHtml(title)}" class="doc-modal-page">`).join('');
  sheet.innerHTML = `
    <div class="modal-handle"></div>
    <button class="modal-close" id="modalClose">×</button>
    <div class="doc-modal-title">${escapeHtml(title)}</div>
    <div class="doc-modal-body">
      ${imgs}
    </div>
  `;
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').classList.add('show');
}
document.getElementById('modalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'modalOverlay') closeModal();
});

function setView(v){
  currentView = v; currentCompany = null; activeCategory='all';
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.view===v));
  document.querySelectorAll('.nav-btn').forEach(b=> b.classList.toggle('active', b.dataset.view===v));
  render();
}
document.querySelectorAll('.tab-btn, .nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> setView(btn.dataset.view));
});

const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', ()=>{
  searchTerm = searchInput.value.trim();
  document.getElementById('clearBtn').style.display = searchTerm ? 'block':'none';
  if(searchTerm && currentView==='companies') currentCompany = null;
  render();
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  searchInput.value=''; searchTerm=''; document.getElementById('clearBtn').style.display='none'; render();
});

loadData();
</script>
</body>
</html>
